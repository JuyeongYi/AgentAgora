<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>AgentAgora — 팀 현황</title>
<link rel="stylesheet" href="/dashboard/static/vendor/tabulator.min.css">
<link rel="stylesheet" href="/dashboard/static/vendor/jsoneditor.min.css">
<link rel="stylesheet" href="/dashboard/static/css/dashboard.css">
</head>
<body>
<div id="login-modal" class="hidden">
  <div class="login-card">
    <h2>AgentAgora 대시보드</h2>
    <label>Username <input id="login-username" type="text" autofocus></label>
    <label id="login-token-label" class="hidden">Token <input id="login-token" type="password"></label>
    <button id="login-submit">접속</button>
  </div>
</div>
<header id="header" class="hidden">
  <span class="title">AgentAgora — <span id="who"></span></span>
  <span id="conn-indicator">●</span>
  <span id="health-summary"></span>
  <input id="search-input" type="search" placeholder="메시지 검색…">
  <button id="open-search">검색</button>
  <button id="open-schemas">스키마</button>
  <button id="open-logs">로그</button>
  <button id="open-files">파일</button>
  <button id="logout">로그아웃</button>
</header>
<div id="top-row" class="hidden">
  <section id="dispatch-panel"></section>
  <section id="metrics-panel"></section>
  <section id="health-detail"></section>
</div>
<nav id="tabs" class="hidden">
  <button class="tab-btn active" data-tab="status">현황</button>
  <button class="tab-btn" data-tab="inbox">운영자 인박스</button>
  <button class="tab-btn" data-tab="matrix">통신 매트릭스</button>
</nav>
<main id="main" class="hidden">
  <section id="tab-status" class="tab-pane active">
    <div id="summary-cards"></div>
    <div id="instances-table"></div>
    <div id="conversations-table"></div>
    <div id="bots-table"></div>
  </section>
  <section id="tab-inbox" class="tab-pane">
    <section id="inbox-panel"></section>
  </section>
  <section id="tab-matrix" class="tab-pane">
    <div id="comm-matrix"></div>
    <div id="flow-view"></div>
  </section>
</main>
<div id="drilldown-modal" class="modal hidden"></div>
<div id="schemas-modal" class="modal hidden"></div>
<div id="logs-modal" class="modal hidden"></div>
<div id="files-modal" class="modal hidden"></div>
<div id="action-modal" class="modal hidden"></div>
<div id="search-modal" class="modal hidden"></div>
<script src="/dashboard/static/vendor/tabulator.min.js"></script>
<script src="/dashboard/static/vendor/jsoneditor.min.js"></script>
<script src="/dashboard/static/js/api.js"></script>
<script src="/dashboard/static/js/stream.js"></script>
<script src="/dashboard/static/js/login.js"></script>
<script src="/dashboard/static/js/health.js"></script>
<script src="/dashboard/static/js/formats.js"></script>
<script src="/dashboard/static/js/inbox.js"></script>
<script src="/dashboard/static/js/dispatch.js"></script>
<script src="/dashboard/static/js/drilldown.js"></script>
<script src="/dashboard/static/js/schemas.js"></script>
<script src="/dashboard/static/js/logs.js"></script>
<script src="/dashboard/static/js/files.js"></script>
<script src="/dashboard/static/js/flow.js"></script>
<script src="/dashboard/static/js/actions.js"></script>
<script src="/dashboard/static/js/search.js"></script>
<script src="/dashboard/static/js/sparkline.js"></script>
<script src="/dashboard/static/js/dashboard.js"></script>
</body>
</html>
